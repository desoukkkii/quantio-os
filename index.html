<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0d12" />
    <meta
      name="description"
      content="Quantio OS — a premium macOS-inspired desktop in the browser: windows, dock, spotlight, terminal, notes, and more."
    />
    <title>Quantio OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="boot-screen">
      <div class="boot-logo">
        <svg viewBox="0 0 80 80" fill="none" aria-hidden="true">
          <rect
            x="8"
            y="8"
            width="64"
            height="64"
            rx="18"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
          />
          <path
            d="M28 34 L40 24 L52 34 L52 50 L40 60 L28 50 Z"
            stroke="currentColor"
            stroke-width="1.8"
            fill="none"
            stroke-linejoin="round"
          />
          <path
            d="M33 39 L40 33 L47 39 L47 51 L40 57 L33 51 Z"
            stroke="currentColor"
            stroke-width="1.2"
            fill="none"
            stroke-linejoin="round"
            opacity="0.6"
          />
          <circle cx="40" cy="45" r="2.5" fill="currentColor" />
        </svg>
      </div>
      <div
        class="boot-progress-track"
        role="progressbar"
        aria-label="Booting Quantio OS"
      >
        <div class="boot-progress-bar" id="boot-bar"></div>
      </div>
      <div class="boot-status" id="boot-status">Starting up...</div>
    </div>

    <div id="lock-screen" role="dialog" aria-label="Lock screen">
      <div class="lock-avatar" aria-hidden="true">Q</div>
      <div class="lock-time" id="lock-time">00:00</div>
      <div class="lock-date" id="lock-date">Loading...</div>
      <button class="lock-btn" id="lock-btn" type="button">
        Click to unlock
      </button>
    </div>

    <main id="desktop" class="hidden" aria-label="Quantio OS desktop">
      <div id="desktop-wallpaper" aria-hidden="true"></div>
      <div id="desktop-icons"></div>
      <div id="window-container"></div>

      <div id="menubar" role="menubar">
        <div class="menubar-left">
          <button
            class="menubar-apple"
            id="apple-btn"
            type="button"
            aria-label="Quantio menu"
          >
            &#63743;
          </button>
          <span class="menubar-app-name" id="menubar-app-name">Finder</span>
          <div class="menubar-menus">
            <button class="menubar-item" type="button">File</button>
            <button class="menubar-item" type="button">Edit</button>
            <button class="menubar-item" type="button">View</button>
            <button class="menubar-item" type="button">Window</button>
            <button class="menubar-item" type="button">Help</button>
          </div>
        </div>
        <div class="menubar-right">
          <button
            class="menubar-item"
            data-action="spotlight"
            type="button"
            aria-label="Open spotlight search"
          >
            &#x1F50D;
          </button>
          <button
            class="menubar-btn"
            id="menubar-wifi"
            type="button"
            aria-label="Wi-Fi"
          >
            &#x1F4F6;
          </button>
          <button
            class="menubar-btn"
            id="menubar-battery"
            type="button"
            aria-label="Battery"
          >
            &#x26A1;
          </button>
          <button
            class="menubar-btn"
            id="menubar-clock"
            type="button"
            aria-label="Clock"
          ></button>
        </div>
      </div>

      <div class="apple-dropdown" id="apple-dropdown" role="menu">
        <div class="apple-item" data-action="about" role="menuitem">
          About Quantio
        </div>
        <div class="apple-sep"></div>
        <div class="apple-item" data-action="sleep" role="menuitem">
          Lock Screen
        </div>
        <div class="apple-item" data-action="restart" role="menuitem">
          Restart...
        </div>
        <div class="apple-item" data-action="shutdown" role="menuitem">
          Shut Down...
        </div>
      </div>

      <nav id="dock" aria-label="Application dock">
        <div class="dock-items" id="dock-items">
          <div class="dock-item" data-app="finder">
            <div class="dock-icon">&#x1F4C1;</div>
            <div class="dock-label">Finder</div>
            <div class="dock-dot"></div>
          </div>
          <div class="dock-item" data-app="terminal">
            <div class="dock-icon">&#x1F5A5;&#xFE0F;</div>
            <div class="dock-label">Terminal</div>
            <div class="dock-dot"></div>
          </div>
          <div class="dock-item" data-app="calculator">
            <div class="dock-icon">&#x1F522;</div>
            <div class="dock-label">Calculator</div>
            <div class="dock-dot"></div>
          </div>
          <div class="dock-item" data-app="notes">
            <div class="dock-icon">&#x1F4DD;</div>
            <div class="dock-label">Notes</div>
            <div class="dock-dot"></div>
          </div>
          <div class="dock-item" data-app="photos">
            <div class="dock-icon">&#x1F5BC;</div>
            <div class="dock-label">Photos</div>
            <div class="dock-dot"></div>
          </div>
          <div class="dock-item" data-app="settings">
            <div class="dock-icon">&#x2699;</div>
            <div class="dock-label">Settings</div>
            <div class="dock-dot"></div>
          </div>
        </div>
      </nav>

      <div id="spotlight" role="dialog" aria-label="Spotlight search">
        <div class="spotlight-overlay"></div>
        <div class="spotlight-modal">
          <div class="spotlight-input-wrap">
            <span class="spotlight-search-icon" aria-hidden="true"
              >&#x1F50D;</span
            >
            <input
              class="spotlight-input"
              id="spotlight-input"
              placeholder="Search apps and actions..."
              spellcheck="false"
              autocomplete="off"
              aria-label="Search"
            />
          </div>
          <div class="spotlight-results" id="spotlight-results"></div>
          <div class="spotlight-footer">
            Press <kbd>Esc</kbd> to close &middot; <kbd>&#8984;K</kbd> to toggle
          </div>
        </div>
      </div>

      <div id="context-menu" role="menu"></div>
      <div id="notification-container" aria-live="polite"></div>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
